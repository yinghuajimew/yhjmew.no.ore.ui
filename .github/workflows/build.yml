name: 编译打包 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17（供 sdkmanager 使用）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK（命令行工具）
        uses: android-actions/setup-android@v3

      # 云端下载 API 30 SDK 和 30.0.3 构建工具
      - name: 安装所需 SDK 组件
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-30" "build-tools;30.0.3"

      - name: 切换到 JDK 8（供 Gradle 编译使用）
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # 升级到 Gradle 6.5，以配合现代的 Android Gradle 插件运行 D8 编译器
      - name: 安装 Gradle 6.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-6.5-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-6.5/bin" >> $GITHUB_PATH

      - name: 生成 local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # === 临时重写根目录 build.gradle（仅在 CI 运行，引入现代 D8 编译器与 google 仓库） ===
      - name: 临时重写根目录 build.gradle
        run: |
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  jcenter()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:4.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  jcenter()
              }
          }
          EOF

      # 1. 临时升级编译版本至 30 (与 D8/Build-tools 一致)
      # 2. 临时插入 compileOptions 配置以开启 Java 8 脱糖支持，兼容 minSdkVersion 14
      - name: 临时升级编译版本与配置（针对 CI 编译环境）
        run: |
          sed -i 's/compileSdkVersion 21/compileSdkVersion 30/g' app/build.gradle
          sed -i 's/buildToolsVersion "21.1.0"/buildToolsVersion "30.0.3"/g' app/build.gradle
          sed -i 's/buildTypes {/compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n\n    buildTypes {/g' app/build.gradle

      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon

      # === 升级签名逻辑：动态加载 BouncyCastle，完美支持 BKS 签名加密方式 ===
      - name: 使用项目内置的 BKS 密钥给 APK 签名
        run: |
          # 1. 下载 BouncyCastle 安全提供者 jar
          wget -q https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk15on/1.68/bcprov-jdk15on-1.68.jar -O /tmp/bcprov.jar

          # 2. 自动寻找输出目录下的 APK 产物
          APK_FILE=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            echo "正在使用加载了 BouncyCastle 的 apksigner 对 $APK_FILE 进行签名..."
            
            # 使用 java -cp 把 BouncyCastle 打入 classpath 并指定类加载器加载
            java -cp "$ANDROID_HOME/build-tools/30.0.3/lib/apksigner.jar:/tmp/bcprov.jar" \
              com.android.apksigner.ApkSignerTool sign \
              --provider-class org.bouncycastle.jce.provider.BouncyCastleProvider \
              --ks app/src/main/assets/debug-mt.bks \
              --ks-type BKS \
              --ks-key-alias mt \
              --ks-pass pass:android \
              --key-pass pass:android \
              "$APK_FILE"
            
            echo "--- 签名验证结果 ---"
            # verify 验证阶段由于不打开 keystore 密钥库，直接调用普通命令即可
            $ANDROID_HOME/build-tools/30.0.3/apksigner verify -v "$APK_FILE"
          else
            echo "错误：没有找到编译生成的 APK 产物！"
            exit 1
          fi

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ForceCloseOreUI-debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
