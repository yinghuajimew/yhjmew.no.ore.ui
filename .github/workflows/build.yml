name: 编译打包 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17（供 sdkmanager 使用）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK（命令行工具）
        uses: android-actions/setup-android@v3

      # 云端下载 API 30 SDK 和 30.0.3 构建工具（原生64位，速度极快）
      - name: 安装所需 SDK 组件
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-30" "build-tools;30.0.3"

      - name: 切换到 JDK 8（供 Gradle 编译使用）
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 安装 Gradle 2.14.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-2.14.1-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-2.14.1/bin" >> $GITHUB_PATH

      - name: 生成 local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # === 临时提升编译版本（仅在 CI 运行，不提交到仓库，本地 AIDE+ 零受影响） ===
      - name: 临时升级编译版本（针对 CI 编译环境）
        run: |
          sed -i 's/compileSdkVersion 21/compileSdkVersion 30/g' app/build.gradle
          sed -i 's/buildToolsVersion "21.1.0"/buildToolsVersion "30.0.3"/g' app/build.gradle

      # implementation 是 AGP 3.x 引入的，AGP 1.x 只认 compile
      # 仅在 CI 运行时临时替换，不会提交回仓库，aide+ 不受任何影响
      - name: 修复依赖配置兼容性（implementation → compile）
        run: sed -i 's/\bimplementation\b/compile/g' app/build.gradle

      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ForceCloseOreUI-debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
