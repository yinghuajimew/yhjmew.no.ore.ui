name: 编译打包 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # sdkmanager 16.0 要求 JDK 17+，先装 17 用于 SDK 配置
      - name: 配置 JDK 17（供 sdkmanager 使用）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK（命令行工具）
        uses: android-actions/setup-android@v3

      - name: 安装所需 SDK 组件
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-21" "build-tools;21.1.0"

      # SDK 装完后切回 JDK 8，AGP 1.x 编译需要它
      - name: 切换到 JDK 8（供 Gradle 编译使用）
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # 项目没有 gradlew，手动安装与 AGP 1.x 兼容的 Gradle 2.14.1
      - name: 安装 Gradle 2.14.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-2.14.1-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-2.14.1/bin" >> $GITHUB_PATH

      # local.properties 不入库，CI 每次按需生成
      - name: 生成 local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ForceCloseOreUI-debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
